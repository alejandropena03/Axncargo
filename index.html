<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXN Cargo | Logística Internacional Canadá - Latam</title>
    <meta name="description" content="AXN Cargo: Su socio logístico experto en Canadá con más de 15 años de trayectoria conectando Canadá, USA y Latinoamérica.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LogisticsBusiness",
        "name": "AXN Cargo",
        "url": "https://www.axncargo.com",
        "logo": "https://www.axncargo.com/favicon.png",
        "description": "AXN Cargo: Su socio logístico experto en Canadá con más de 15 años de trayectoria conectando Canadá, USA y Latinoamérica.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "1460 The Queensway Ste 4423",
          "addressLocality": "Toronto",
          "addressRegion": "ON",
          "postalCode": "M8Z 1S4",
          "addressCountry": "CA"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-647-390-5753",
          "contactType": "customer service",
          "areaServed": ["CA", "US", "Latam"],
          "availableLanguage": ["Spanish", "English"]
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Servicios Logísticos",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Agentes de Carga",
                "description": "Aliado estratégico en Canadá para agentes de carga en LATAM y USA."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Industria y Comercio",
                "description": "Logística para empresas expandiendo su mercado entre Canadá, USA y LATAM."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Mudanzas Internacionales",
                "description": "Soluciones eficientes para mudanzas internacionales hacia LATAM."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Envío de Vehículos",
                "description": "Gestión integral de compra y envío de vehículos desde Canadá."
              }
            }
          ]
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
